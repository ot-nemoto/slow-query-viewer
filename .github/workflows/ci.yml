name: CI

on:
  pull_request:
    branches:
      - develop
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check if Prisma is used
        id: prisma_check
        run: |
          if [ -f prisma/schema.prisma ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Prisma client
        if: steps.prisma_check.outputs.exists == 'true'
        run: npx prisma generate

      # biome ci は lint とフォーマットを書き換えずに検査する。
      # package.json の script に依存させない（リポジトリ側の lint 定義がぶれても検査が止まらないため）。
      # --no: ローカル node_modules の biome を強制し、未導入なら明示的に失敗させる
      #       （付けないと未導入時にレジストリから最新版を黙って取得し、バージョンdrift・供給網リスクになる）
      - name: Lint & Format check
        run: npx --no biome ci .

      - name: Unit test
        run: npm run test
